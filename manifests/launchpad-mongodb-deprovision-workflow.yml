apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: "mongodb-deprovision-{{ LAUNCHPAD_INSTANCE_NAME }}"
  namespace: "{{ LAUNCHPAD_INSTANCE_NAME }}"
spec:
  serviceAccountName: workflow-executor
  entrypoint: main
  volumes:
    - name: service-account-token
      secret:
        secretName: workflow-executor-token
  arguments:
    parameters:
      - name: namespace
        value: "{{ LAUNCHPAD_INSTANCE_NAME }}"
      - name: database-name
        value: "{{ LAUNCHPAD_INSTANCE_MONGODB_DATABASE }}"
      - name: forum-database-name
        value: "{{ LAUNCHPAD_INSTANCE_MONGODB_DATABASE_FORUM }}"
      - name: username
        value: "{{ LAUNCHPAD_INSTANCE_MONGODB_USERNAME }}"
      - name: mongodb-provider
        value: "{{ LAUNCHPAD_INSTANCE_MONGODB_PROVIDER }}"
      - name: mongodb-cluster-id
        value: "{{ LAUNCHPAD_INSTANCE_MONGODB_CLUSTER_ID }}"
      - name: digitalocean-token
        value: "{{ LAUNCHPAD_INSTANCE_DIGITALOCEAN_TOKEN }}"
      - name: atlas-public-key
        value: "{{ LAUNCHPAD_INSTANCE_ATLAS_PUBLIC_KEY }}"
      - name: atlas-private-key
        value: "{{ LAUNCHPAD_INSTANCE_ATLAS_PRIVATE_KEY }}"
      - name: atlas-project-id
        value: "{{ LAUNCHPAD_INSTANCE_ATLAS_PROJECT_ID }}"
      - name: atlas-cluster-name
        value: "{{ LAUNCHPAD_INSTANCE_ATLAS_CLUSTER_NAME }}"
  workflowTemplateRef:
    name: mongodb-deprovision-template
    clusterScope: true
